name: Build Voom App (iOS & Android)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # iOS Build (macOS runner required)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.0'

      - name: Patch pubspec.yaml (use deepar stub for CI)
        run: python3 scripts/patch_pubspec.py

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install --repo-update && cd ..

      - name: Build iOS (no code signing)
        run: flutter build ios --release --no-codesign

      - name: Zip Runner.app for download
        run: cd build/ios/iphoneos && zip -r Runner.app.zip Runner.app

      - name: Upload iOS .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/Runner.app.zip
          retention-days: 7

  # ─────────────────────────────────────────────
  # Android Build (ubuntu runner is fine)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.27.0'

      - name: Patch pubspec.yaml (use deepar stub for CI)
        run: python3 scripts/patch_pubspec.py

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android APK (release)
        run: flutter build apk --release

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
